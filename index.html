<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kusursuz Hesap Makinesi</title>
    <style>
        :root {
            --bg-color: #050505;
            --calc-bg: #111111;
            --accent: #00ffe0;
            --text-color: #ffffff;
            --btn-bg: #1a1a1a;
            --btn-hover: #252525;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
        }

        .calculator {
            background-color: var(--calc-bg);
            width: 320px;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 224, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .display-container {
            background-color: #000;
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #222;
        }

        #display {
            width: 100%;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 35px;
            text-align: right;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 60px); 
            gap: 12px;
        }

        button {
            border-radius: 10px;
            border: none;
            background-color: var(--btn-bg);
            color: var(--text-color);
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background-color: var(--btn-hover);
            box-shadow: 0 0 10px rgba(0, 255, 224, 0.2);
        }

        .operator { color: var(--accent); }

        /* YATAYDA UZUN 0 */
        .zero {
            grid-column: span 2; /* Yan yana 2 kutu kaplar */
            height: 100%;
        }

        /* DİKEYDE UZUN EŞİTTİR */
        .equal {
            grid-row: span 2; /* Alt alta 2 kutu kaplar */
            height: 100%;
            background: var(--accent);
            color: #000;
        }

        .clear { color: #ff3b30; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display-container">
        <input type="text" id="display" readonly placeholder="0">
    </div>
    
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendToDisplay('/')">÷</button>
        <button class="operator" onclick="appendToDisplay('*')">×</button>
        <button class="operator" onclick="backspace()">⌫</button>
        
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="appendToDisplay('-')">−</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="appendToDisplay('+')">+</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button class="equal" onclick="calculate()">=</button> <button class="zero" onclick="appendToDisplay('0')">0</button> <button onclick="appendToDisplay('.')">.</button>
        </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendToDisplay(input) {
        if (display.value === "0") display.value = "";
        display.value += input;
    }

    function clearDisplay() { display.value = "0"; }

    function backspace() {
        display.value = display.value.slice(0, -1);
        if (display.value === "") display.value = "0";
    }

    function calculate() {
        try {
            let result = eval(display.value.replace('÷', '/').replace('×', '*'));
            display.value = result;
        } catch {
            display.value = "Hata";
            setTimeout(clearDisplay, 1000);
        }
    }
</script>

</body>
</html>
